# REPO: pankha (public) | Builds Rust agents, Windows agent, Docker images, and creates GitHub release
name: release-public
run-name: "release-public ${{ github.event.inputs.version || github.ref_name || '' }}"

# This workflow runs on the PUBLIC repo (pankha) to take advantage of FREE ARM64 runners.
# Triggered by v* tag push or manual workflow_dispatch.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # Manual trigger for testing
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
      is_prerelease:
        description: 'Is this a pre-release? (true/false, or auto to detect from version)'
        required: false
        default: 'auto'

permissions:
  contents: write
  packages: write



jobs:
  # Job 1: Build Rust agents (parallel matrix with FREE ARM64 runner)
  build-rust-agents:
    strategy:
      fail-fast: true
      matrix:
        include:
          - arch: x64
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
          - arch: arm64
            target: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04  # Use older Ubuntu for GLIBC 2.35 compatibility
            cross: true           # Enable cross-compilation

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: agents/clients/linux/rust
          shared-key: rust-cache-${{ matrix.arch }}

      # Cross-compilation setup for ARM64 on x86_64
      - name: Setup cross-compilation (ARM64)
        if: matrix.cross == true
        run: |
          rustup target add aarch64-unknown-linux-gnu
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends gcc-aarch64-linux-gnu libc6-dev-arm64-cross

      - name: Compute PANKHA_VERSION
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          VERSION_NUM="${VERSION#v}"  # Remove 'v' prefix

          # Convert 4-part version to SemVer prerelease format: 0.1.7.1 → 0.1.7-1
          DOTS=$(echo "$VERSION_NUM" | grep -o '\.' | wc -l)
          if [ "$DOTS" -ge 3 ]; then
            PANKHA_VERSION=$(echo "$VERSION_NUM" | sed 's/^\([0-9]*\.[0-9]*\.[0-9]*\)\.\([0-9]*\)/\1-\2/')
            echo "⚠️  Converting: $VERSION_NUM → $PANKHA_VERSION (SemVer prerelease format)"
          else
            PANKHA_VERSION="$VERSION_NUM"
            echo "📝 Using version: $PANKHA_VERSION"
          fi

          # Guard: refuse to build a release with empty or placeholder version
          if [ -z "$PANKHA_VERSION" ] || [ "$PANKHA_VERSION" = "0.0.0-dev" ] || [ "$PANKHA_VERSION" = "dev" ]; then
            echo "❌ ERROR: PANKHA_VERSION resolved to empty/placeholder: '$PANKHA_VERSION'"
            echo "   Release builds require a real tag version."
            exit 1
          fi

          echo "PANKHA_VERSION=$PANKHA_VERSION" >> $GITHUB_ENV
          echo "✅ PANKHA_VERSION=$PANKHA_VERSION exported to subsequent steps"

      - name: Build Rust agent (${{ matrix.arch }})
        working-directory: agents/clients/linux/rust
        run: |
          echo "🦀 Building Rust agent for ${{ matrix.arch }} on ${{ matrix.runner }}..."

          if [ "${{ matrix.cross }}" = "true" ]; then
            # Cross-compile for ARM64 using older glibc from Ubuntu 22.04
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
            cargo build --release --locked --target ${{ matrix.target }}
            BINARY_PATH="target/${{ matrix.target }}/release/pankha-agent-linux"
          else
            # Native build (x86_64)
            cargo build --release --locked
            BINARY_PATH="target/release/pankha-agent-linux"
          fi

          # Rename with architecture suffix
          mv $BINARY_PATH ${BINARY_PATH}_${{ matrix.arch }}

          echo "✅ ${{ matrix.arch }} agent built"
          ls -lh target/release/pankha-agent-linux_${{ matrix.arch }} 2>/dev/null || \
          ls -lh target/${{ matrix.target }}/release/pankha-agent-linux_${{ matrix.arch }} 2>/dev/null

      - name: Upload agent binary
        uses: actions/upload-artifact@v4
        with:
          name: pankha-agent-${{ matrix.arch }}
          path: |
            agents/clients/linux/rust/target/release/pankha-agent-linux_${{ matrix.arch }}
            agents/clients/linux/rust/target/${{ matrix.target }}/release/pankha-agent-linux_${{ matrix.arch }}
          if-no-files-found: error
          retention-days: 1

  # Job 2: Build IPMI agent (x64 only - enterprise BMC servers)
  build-ipmi-agent:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: agents/clients/linux/virtual-agents/host-ipmi-rust
          shared-key: rust-cache-ipmi-x64

      - name: Compute PANKHA_VERSION
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          VERSION_NUM="${VERSION#v}"  # Remove 'v' prefix

          # Convert 4-part version to SemVer prerelease format: 0.1.7.1 → 0.1.7-1
          DOTS=$(echo "$VERSION_NUM" | grep -o '\.' | wc -l)
          if [ "$DOTS" -ge 3 ]; then
            PANKHA_VERSION=$(echo "$VERSION_NUM" | sed 's/^\([0-9]*\.[0-9]*\.[0-9]*\)\.\([0-9]*\)/\1-\2/')
            echo "⚠️  Converting: $VERSION_NUM → $PANKHA_VERSION (SemVer prerelease format)"
          else
            PANKHA_VERSION="$VERSION_NUM"
            echo "📝 Using version: $PANKHA_VERSION"
          fi

          # Guard: refuse to build a release with empty or placeholder version
          if [ -z "$PANKHA_VERSION" ] || [ "$PANKHA_VERSION" = "0.0.0-dev" ] || [ "$PANKHA_VERSION" = "dev" ]; then
            echo "❌ ERROR: PANKHA_VERSION resolved to empty/placeholder: '$PANKHA_VERSION'"
            echo "   Release builds require a real tag version."
            exit 1
          fi

          echo "PANKHA_VERSION=$PANKHA_VERSION" >> $GITHUB_ENV
          echo "✅ PANKHA_VERSION=$PANKHA_VERSION exported to subsequent steps"

      - name: Build IPMI agent (x64)
        working-directory: agents/clients/linux/virtual-agents/host-ipmi-rust
        run: |
          echo "🦀 Building IPMI agent for x64..."
          cargo build --release --locked
          mv target/release/pankha-agent-ipmi-linux target/release/pankha-agent-ipmi-linux_x64
          echo "✅ IPMI x64 agent built"
          ls -lh target/release/pankha-agent-ipmi-linux_x64

      - name: Upload IPMI agent binary
        uses: actions/upload-artifact@v4
        with:
          name: pankha-agent-ipmi-x64
          path: agents/clients/linux/virtual-agents/host-ipmi-rust/target/release/pankha-agent-ipmi-linux_x64
          if-no-files-found: error
          retention-days: 1

  # Job 3: Build Windows agent
  build-windows-agent:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Build Windows Installer
        working-directory: agents/clients/windows/varient-c
        run: .\build.ps1 -Configuration Release -Clean -Publish -BuildInstaller -Version "${{ github.event.inputs.version || github.ref_name }}"

      - name: Upload MSI Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pankha-agent-windows-msi
          path: agents/clients/windows/varient-c/publish/win-x64/installer/pankha-agent-windows_x64.msi
          if-no-files-found: error
          retention-days: 1

  # Job 4: Build Docker images
  build-docker:
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-22.04
            tag_suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm  # FREE ARM64 runner - NO QEMU needed!
            tag_suffix: arm64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "🐳 Building Docker for ${{ matrix.platform }}: ${VERSION}"

      - name: Build and push Docker image (${{ matrix.tag_suffix }})
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          tags: |
            anexgohan/pankha:${{ steps.version.outputs.version }}-${{ matrix.tag_suffix }}
          cache-from: type=registry,ref=anexgohan/pankha:buildcache-${{ matrix.tag_suffix }}
          cache-to: type=registry,ref=anexgohan/pankha:buildcache-${{ matrix.tag_suffix }},mode=max

  # Job 5: Compose release notes (reusable workflow)
  compose-notes:
    needs: [build-rust-agents, build-ipmi-agent, build-windows-agent, build-docker]
    uses: ./.github/workflows/release-notes.yml
    with:
      version: ${{ github.event.inputs.version || github.ref_name }}

  # Job 6: Create multi-arch manifest and release
  release:
    needs: [build-rust-agents, build-ipmi-agent, build-windows-agent, build-docker, compose-notes]
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "version_number=${VERSION#v}" >> $GITHUB_OUTPUT
          
          # Get pre-release flag from dispatch or auto-detect from version
          IS_PRERELEASE="${{ github.event.inputs.is_prerelease || 'auto' }}"
          if [ "$IS_PRERELEASE" = "auto" ]; then
            # Auto-detect from version string (alpha, beta, rc, dev, preview, etc.)
            # NOTE: The frontend (DeploymentPage.tsx) ranks these in the following order:
            # rc > beta > alpha > pre/preview > insiders > experimental > canary > dev > nightly > test/testing
            if [[ "$VERSION" =~ -(alpha|beta|rc|pre|preview|dev|canary|nightly|experimental|insiders|test|testing) ]]; then
              IS_PRERELEASE="true"
            else
              IS_PRERELEASE="false"
            fi
          fi
          echo "is_prerelease=${IS_PRERELEASE}" >> $GITHUB_OUTPUT
          
          if [ "$IS_PRERELEASE" = "true" ]; then
            echo "🧪 PRE-RELEASE build: ${VERSION}"
          else
            echo "📦 STABLE release build: ${VERSION}"
          fi

      # Download all artifacts
      - name: Download x64 agent
        uses: actions/download-artifact@v4
        with:
          name: pankha-agent-x64
          path: artifacts/x64

      - name: Download ARM64 agent
        uses: actions/download-artifact@v4
        with:
          name: pankha-agent-arm64
          path: artifacts/arm64

      - name: Download IPMI x64 agent
        uses: actions/download-artifact@v4
        with:
          name: pankha-agent-ipmi-x64
          path: artifacts/ipmi

      - name: Download Windows MSI
        uses: actions/download-artifact@v4
        with:
          name: pankha-agent-windows-msi
          path: artifacts/windows

      # Prepare release assets
      - name: Prepare release assets
        run: |
          mkdir -p release-assets

          # Find and copy agent binaries (OS + IPMI)
          find artifacts -name "pankha-agent-linux_*" -exec cp {} release-assets/ \;
          find artifacts -name "pankha-agent-ipmi-linux_*" -exec cp {} release-assets/ \;

          # Copy Windows MSI
          cp artifacts/windows/*.msi release-assets/

          # Copy config example
          cp agents/clients/linux/rust/config.example.json release-assets/

          # Copy Docker deployment files
          cp compose.yml release-assets/
          cp .env release-assets/example.env

          # Copy user-supplied screenshots referenced from .github/input/release-notes.md
          if [ -d .github/input/images ]; then
            find .github/input/images -type f ! -name '.gitkeep' -exec cp {} release-assets/ \;
          fi

          # Make binaries executable
          chmod +x release-assets/pankha-agent-*linux_* 2>/dev/null || true

          # Generate checksums
          cd release-assets
          sha256sum * | sort -k2 > checksums.txt

          echo "📦 Release assets prepared:"
          ls -lh

      # Login to Docker Hub for manifest creation
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # Create and push multi-arch manifest
      - name: Create Docker manifest
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          IS_PRERELEASE="${{ steps.version.outputs.is_prerelease }}"

          echo "🐳 Creating multi-arch manifest for ${VERSION}..."

          # Create versioned manifest (always)
          docker manifest create anexgohan/pankha:${VERSION} \
            anexgohan/pankha:${VERSION}-amd64 \
            anexgohan/pankha:${VERSION}-arm64

          docker manifest push anexgohan/pankha:${VERSION}
          echo "✅ Pushed: anexgohan/pankha:${VERSION}"

          # Update rolling tags
          if [ "$IS_PRERELEASE" = "true" ]; then
            echo "🧪 Updating rolling beta and testing tags..."
            
            # Update :beta (Absolute Latest)
            docker manifest create anexgohan/pankha:beta \
              anexgohan/pankha:${VERSION}-amd64 \
              anexgohan/pankha:${VERSION}-arm64
            docker manifest push anexgohan/pankha:beta
            echo "✅ Pushed: anexgohan/pankha:beta"

            # Update :testing (Pre-release Only)
            docker manifest create anexgohan/pankha:testing \
              anexgohan/pankha:${VERSION}-amd64 \
              anexgohan/pankha:${VERSION}-arm64
            docker manifest push anexgohan/pankha:testing
            echo "✅ Pushed: anexgohan/pankha:testing"
            
            echo "⏭️  Skipped: anexgohan/pankha:latest (pre-release)"
          else
            echo "🎉 Updating rolling latest and beta tags..."

            # Update :latest (Stable Only)
            docker manifest create anexgohan/pankha:latest \
              anexgohan/pankha:${VERSION}-amd64 \
              anexgohan/pankha:${VERSION}-arm64
            docker manifest push anexgohan/pankha:latest
            echo "✅ Pushed: anexgohan/pankha:latest"

            # Update :beta (Absolute Latest)
            docker manifest create anexgohan/pankha:beta \
              anexgohan/pankha:${VERSION}-amd64 \
              anexgohan/pankha:${VERSION}-arm64
            docker manifest push anexgohan/pankha:beta
            echo "✅ Pushed: anexgohan/pankha:beta"

            echo "⏭️  Skipped: anexgohan/pankha:testing (stable release)"
          fi

      # Create version tag (if not exists)
      - name: Create version tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          git config user.name "Anexgohan"
          git config user.email "monish05m@gmail.com"

          # Create and push tag (force update for re-runs)
          git tag -f ${VERSION} -m "Release ${VERSION}"
          git push -f origin ${VERSION}

          echo "✅ Tag ${VERSION} created/updated"

      # Create GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          files: |
            release-assets/pankha-agent-linux_x64
            release-assets/pankha-agent-linux_arm64
            release-assets/pankha-agent-ipmi-linux_x64
            release-assets/pankha-agent-windows_x64.msi
            release-assets/config.example.json
            release-assets/compose.yml
            release-assets/example.env
            release-assets/checksums.txt
            release-assets/*.png
            release-assets/*.jpg
            release-assets/*.jpeg
            release-assets/*.gif
            release-assets/*.webp
          body: ${{ needs.compose-notes.outputs.body }}
          draft: false
          prerelease: ${{ steps.version.outputs.is_prerelease == 'true' }}

      # Reset .github/input/release-notes.md to its template and clear images/
      # so the next release starts from a clean slate. Commit back to main.
      # (The published GitHub Release page is the canonical archive; git log of
      # release-notes.md preserves the authored prose per release.)
      - name: Reset release notes input
        if: success()
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Switch to latest main for the cleanup commit
          git fetch origin main
          git checkout -B main origin/main

          bash .github/scripts/reset-release-notes.sh
          find .github/input/images -type f ! -name '.gitkeep' -delete 2>/dev/null || true

          git config user.name "Anexgohan"
          git config user.email "monish05m@gmail.com"
          git add .github/input/release-notes.md .github/input/images
          if git diff --cached --quiet; then
            echo "No release-notes changes to commit"
          else
            git commit -m "chore: reset release-notes input after ${VERSION}"
            git push origin main
          fi

      # Summary
      - name: Release Summary
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          IS_PRERELEASE="${{ steps.version.outputs.is_prerelease }}"

          if [ "$IS_PRERELEASE" = "true" ]; then
            echo "## 🧪 Pre-release ${VERSION} Complete!" >> $GITHUB_STEP_SUMMARY
          else
            echo "## 🎉 Release ${VERSION} Complete!" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ✅ Published Artifacts:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Docker Images (Multi-arch):**" >> $GITHUB_STEP_SUMMARY
          echo "- \`anexgohan/pankha:${VERSION}\` (amd64 + arm64)" >> $GITHUB_STEP_SUMMARY
          if [ "$IS_PRERELEASE" = "true" ]; then
            echo "- ✅ \`anexgohan/pankha:beta\` (updated)" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ \`anexgohan/pankha:testing\` (updated)" >> $GITHUB_STEP_SUMMARY
            echo "- ⏭️ \`anexgohan/pankha:latest\` (skipped - pre-release)" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ✅ \`anexgohan/pankha:latest\` (updated)" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ \`anexgohan/pankha:beta\` (updated)" >> $GITHUB_STEP_SUMMARY
            echo "- ⏭️ \`anexgohan/pankha:testing\` (skipped - stable)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Release Assets:**" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ pankha-agent-linux_x64" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ pankha-agent-linux_arm64" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ pankha-agent-ipmi-linux_x64" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ pankha-agent-windows_x64.msi" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ config.example.json" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ compose.yml" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ example.env" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ checksums.txt" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 Links:" >> $GITHUB_STEP_SUMMARY
          echo "- [Release Page](https://github.com/Anexgohan/pankha/releases/tag/${VERSION})" >> $GITHUB_STEP_SUMMARY
          echo "- [Docker Hub](https://hub.docker.com/r/anexgohan/pankha)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ⚡ Build Performance:" >> $GITHUB_STEP_SUMMARY
          echo "- Rust agents: Native builds (x64 + ARM64)" >> $GITHUB_STEP_SUMMARY
          echo "- Docker images: Native builds (amd64 + arm64)" >> $GITHUB_STEP_SUMMARY
          echo "- Windows agent: Native build" >> $GITHUB_STEP_SUMMARY
